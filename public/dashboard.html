            <!-- Gráficos de barra  -->
            <div class="cards2" id="cardAquarios2">

                    </div>
                    <div class="div-canvas"><canvas id="myChart"></canvas></div>
                </div>

                    <div class="tipo-grafico">
                        <p>Você ficou entre os </p>

                </div>

        </div>

<script>

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    let idUsuario = sessionStorage.ID_USUARIO;

   window.onload = exibirDashboardUsuario();

   // assim que carregar a pagina, essa funcao irá chamar as outras 
    function exibirDashboardUsuario() {
        obterDadosGrafico(idUsuario)
        atualizarDashboard()
    }

    function obterDadosGrafico(idUsuario) {

        // PARA PLOTAR GRAFICOS 
        fetch(`/dashboard/listarRanking/`)
            .then(function (response) {
                if (response.ok) {
                    response.json()
                        .then(function (resposta) {
                            console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                            plotarGrafico(resposta, idUsuario);
                        });
                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

    }

    function plotarGrafico(resposta, idUsuario) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
         let dados = {
            labels: labels,
            datasets: [{
                label: 'Total de Acertos',
                data: [],
                fill: false,
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1
            }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
       for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.nome_usuario);
            dados.datasets[0].data.push(registro.maior_posicao);
        }

         // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar',
            data: dados,
            options: {
            indexAxis: 'y'
}
        };

        let myChart = new Chart(
            document.getElementById(`myChart`),
            config
        );
    }

    function atualizarDashboard() {

        // PARA KPI 
        fetch(`/dashboard/listarTotalUsuarios/`)
            .then(function (response) {
                if (response.ok) {
                    response.json()
                    .then(function (resposta) {
                        console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                        document.getElementById("card-total-usuarios").innerHTML = resposta[0].total_usuarios
                           
                        });
                    } else {
                        console.error('Nenhum dado encontrado ou erro na API');
                }
            })
              .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ KPI: ${error.message}`);
            });

        fetch(`/dashboard/listarTotalInteracoesQuiz/`)
            .then(function (response) {
                if (response.ok) {
                    response.json()
                    .then(function (resposta) {
                        console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                        document.getElementById("card-total-interacoes").innerHTML = resposta[0].total_interacoes
                           
                        });
                    } else {
                        console.error('Nenhum dado encontrado ou erro na API');
                }
            })
              .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ KPI: ${error.message}`);
            });

        fetch(`/dashboard/listarAcertos/${idUsuario}`)
            .then(function (response) {
                if (response.ok) {
                    response.json()
                    .then(function (resposta) {
                        console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                        document.getElementById("card-total-acertos").innerHTML = resposta[0].totalAcertos
                           
                        });
                    } else {
                        console.error('Nenhum dado encontrado ou erro na API');
                }
            })
              .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ Metrica: ${error.message}`);
            });

        fetch(`/dashboard/listarErros/${idUsuario}`)
            .then(function (response) {
                if (response.ok) {
                    response.json()
                    .then(function (resposta) {
                        console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                        document.getElementById("card-total-erros").innerHTML = resposta[0].totalErros
                           
                        });
                    } else {
                        console.error('Nenhum dado encontrado ou erro na API');
                }
            })
              .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ Metrica: ${error.message}`);
            });

        


    }</script>
