            <div class="cards2" id="cardAquarios2">

                        <p>Artistas Favoritos</p>
                    </div>
                    <div class="div-canvas">
                        <canvas id="myChart2"></canvas>
                    </div>
                </div>
                <div class="grafico-barra">
                    <div class="tipo-grafico">
                        <p>Generos Favoritos</p>
                    </div>
                    <div class="div-canvas">
                        <canvas id="myChart3"></canvas>
                    </div>
                </div>
                
            </div>

        </div>

    </div>

</body>

<script>

   
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['00:00', '02:00', '04:00','06:00', '08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
            datasets: [{
                label: 'Novos Usuários registrados',
                borderColor: 'rgb(181, 22, 22)',
                backgroundColor: 'rgb(181, 22, 22)',
                data: [30, 29, 28, 25, 22, 23,3,6,10,3,16,10,30],
                borderWidth: 3
            }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    const ctx1 = document.getElementById('myChart1');

    new Chart(ctx1, {
        type: 'line',
       data: {
            labels: ['00:00', '02:00', '04:00','06:00', '08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
            datasets: [{
                label: 'Novas Interações com o Quiz',
                borderColor: 'rgb(181, 22, 22)',
                backgroundColor: 'rgb(181, 22, 22)',
                data: [25, 28, 24, 20, 22, 21,3,5,7,2,14,9,30],
                borderWidth: 3
            }
            ]
          
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

fetch("/quiz/artistas") // grafico ARTISTAS
    .then(res => res.json())
    
    .then(dados => {
         const ctx2 = document.getElementById('myChart2');
    const labels = dados.map(item => item.artista);
    const valores = dados.map(item => item.total);

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Artistas Favoritos',
                data: valores
            }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    })
   
fetch("/quiz/generos") 
  .then(res => res.json())
  .then(dados => {

    const labels = dados.map(item => item.genero);
    const valores = dados.map(item => item.total);

    const ctx3 = document.getElementById('myChart3');

    new Chart(ctx3, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Gêneros Preferidos',
                data: valores,
                borderWidth: 3
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    })
    })
