<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTech | Tempo Real</title>
    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>
<body onload="validarSessao(), exibirAquarios(),  atualizacaoPeriodica()">
    <div class="janela">
        <div class="header-left dash-header">

            <img src="../assets/imgs/logo.png" width="50px" height="50px">
             <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>
            <div class="btn-nav">
                <h3>Aquários</h3>
            </div>
            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Gráficos</h3>
                </a>
            </div>
            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Mural de Avisos</h3>
                </a>
            </div>
            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="dash">
            <div id="alerta">
            </div>
            <div class="area-parametros-alerta">
                <p class="titulo-legenda">
                    Dashboard
                </p>
                <div class="parametros-alerta">
                    <div class="item-regua perigo-frio">
                        <p>Total de Usuários</p>
                        <p>&lt;=5°C</p>
                    </div>
                    <div class="item-regua alerta-frio">
                        <p class="par-quiz">Quiz</p>
                        <p>Total Interações: </p>
                        <p>&lt;=10°C</p>
                    </div>
                    <div class="item-regua ideal">
                        <p class="par-quiz">Quiz</p>
                        <p>Total Acertos</p>
                        <p>20%</p>
                    </div>
                    <div class="item-regua alerta-quente">
                         <p class="par-quiz">Quiz</p>
                        <p>Total Erros</p>
                        <p>30%</p>
                    </div>
                   
                </div>
            </div>

            <div class="cards" id="cardAquarios">
                <div class="grafico">
                    <div class="tipo-grafico">
                        <p>Usuarios Novos</p>
                    </div>
                    <div class="div-canvas">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
                <div class="grafico">
                    <div class="tipo-grafico">
                        <p>Interacoes Com o Quiz</p>
                    </div>
                    <div class="div-canvas">
                        <canvas id="myChart1"></canvas>
                    </div>
                </div>
            </div>

            <div class="cards2" id="cardAquarios2">
                <div class="grafico-barra">
                    <div class="tipo-grafico">
                        <p>Artistas Favoritos</p>
                    </div>
                    <div class="div-canvas">
                        <canvas id="myChart2"></canvas>
                    </div>
                </div>
                <div class="grafico-barra">
                    <div class="tipo-grafico">
                        <p>Generos Favoritos</p>
                    </div>
                    <div class="div-canvas">
                        <canvas id="myChart3"></canvas>
                    </div>
                </div>
                <div class="grafico-barra">
                    <div class="tipo-grafico">
                        <p>Década Favorita</p>
                    </div>
                    <div class="div-canvas">
                        <canvas id="myChart4"></canvas>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>

<script>
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['00:00', '02:00', '04:00','06:00', '08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
            datasets: [{
                label: 'Novos Usuários registrados ',
                borderColor: 'rgb(181, 22, 22)',
                backgroundColor: 'rgb(181, 22, 22)',
                data: [30, 29, 28, 25, 22, 23,3,6,10,3,16,10,30],
                borderWidth: 3
            }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    const ctx1 = document.getElementById('myChart1');

    new Chart(ctx1, {
        type: 'line',
       data: {
            labels: ['00:00', '02:00', '04:00','06:00', '08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
            datasets: [{
                label: 'Novas Interações com o Quiz',
                borderColor: 'rgb(181, 22, 22)',
                backgroundColor: 'rgb(181, 22, 22)',
                data: [25, 28, 24, 20, 22, 21,3,5,7,2,14,9,30],
                borderWidth: 3
            }
            ]
          
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    const ctx2 = document.getElementById('myChart2');

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Artistas'],
            datasets: [{
                label: 'Lana Del Rey',
                borderColor: '#e643b7',
                backgroundColor: '#e643b7',
                data: [30],
                borderWidth: 3
            },
            {
                label: 'Olivia Rodrigo',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [40],
                borderWidth: 3

            },
            {
                label: 'Sabrina Carpenter',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [30],
                borderWidth: 3

            },
            {
                label: 'Chappell Roan',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [24],
                borderWidth: 3

            },
            {
                label: 'Pink Pantheress',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [14],
                borderWidth: 3

            },
            {
                label: 'outro',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [2],
                borderWidth: 3

            }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    const ctx3 = document.getElementById('myChart3');

    new Chart(ctx3, {
        type: 'bar',
        data: {
            labels: ['Gênero'],
            datasets: [{
                label: 'Pop',
                borderColor: '#9e375f',
                backgroundColor: '#9e375f',
                data: [80],
                borderWidth: 3
            },
            {
                label: 'Rock',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [82],
                borderWidth: 3

            },
            {
                label: 'MPB',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [83],
                borderWidth: 3

            },
            {
                label: 'Funk',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [76],
                borderWidth: 3

            },
            {
                label: 'Indie',
                borderColor: 'rgb(31, 37, 120)',
                backgroundColor: 'rgb(31, 37, 120)',
                data: [80],
                borderWidth: 3

            }
            ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    
    const ctx4 = document.getElementById('myChart4');

    new Chart(ctx4, {
        type: 'bar',
        data: {
            labels: ['60', '70', '80', '90', '2000', '2010'],
            datasets: [{
                label: 'Década',
                borderColor: 'rgb(181, 22, 22)',
                backgroundColor: 'rgb(181, 22, 22)',
                data: [10, 20, 30,20,50,40,10],
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    

    function exibirAquarios() {
        JSON.parse(sessionStorage.AQUARIOS).forEach(item => {
            document.getElementById("cardAquarios").innerHTML += `
                    <div class="card-aquario">
                        <div class="title-aquario">
                            <h1>${item.descricao}</h1>
                        </div>
                        <div class="desc-aquario">
                        <div class="temperatura">
                            <p id="temp_aquario_${item.id}">-°C</p>
                        </div>
                        <div class="cor-alerta" id="card_${item.id}"></div>
                    </div>
                    </div>
                    `
        });
    }

</script>

</html>
