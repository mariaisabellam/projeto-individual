<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="./assets/icon/logo.png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <!--Header-->

    <div class="header">
        <div class="container">
            <div class="img-logo"><img src="./assets/imgs/logo.png" alt="logo" width="40px" height="40px"></div>
            <ul class="navbar">
                <li>
                    <a href="index.html">HOME</a>
                </li>
                <br>
                <li>
                    <a href="quiz.html">QUIZ</a>
                </li>
                <br>
                <li class="agora">
                    <a href="login.html">LOGIN</a>
                </li>
                <br>
                <li>
                    <button class="btn-cadastro"><a href="cadastro.html">CADASTRO</a></button>
                </li>
            </ul>
        </div>
    </div>


    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="imgtop">
            <img src="/assets/imgs/left-waves.png" width="121px" height="121px">
            <img class="img-canto" src="/assets/imgs/top-note.png" width="80px" height="100px">
        </div>
        <div class="container">

            <div class="imgLogin">
                <img src="/assets/imgs/img-pink2.jpg" width="380px">
            </div>
            <div class="card card-login">
                <div class="formulario">
                    <div class="titulo-form">
                        <p>LOGIN</p>
                    </div>
                    <div class="campos-formulario">
                        <div class="campo">
                            <span>E-mail:</span>
                            <input id="email_input" type="text" placeholder="Login">
                        </div>
                        <div class="campo">
                            <span>Senha:</span>
                            <input id="senha_input" type="password" placeholder="******">
                        </div>
                        <button class="botao" onclick="entrar()">Entrar</button>
                        <div class="card-cadastrar">
                            <span>Não possui conta? <a href="cadastro.html">Cadastre-se</a></span>
                        </div>
                    </div>

                    <div id="div_aguardar" class="loading-div">
                        <img src="./assets/circle-loading.gif" id="loading-gif">
                    </div>
                </div>
                <div id="div_erros_login"></div>
            </div>
        </div>
        <div class="imgbottom">
            <img src="/assets/imgs/bottom-note.png" width="100px">
        </div>
    </div>



</body>

</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)


                    // apenas para exibir o loading
                    setTimeout(function () {
                        if (json.id == 1) {
                            window.location = "./dashboard/cards.html";
                        } else {
                            window.location = "quiz.html";
                        }
                    }, 1000);
                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
