<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="icon" href="./assets/icon/logo.png">
</head>

<body onload="validarSessaoQuiz(); onloadEsconder()">
  <div class="header">
    <div class="container">
      <div class="img-logo"><img src="./assets/imgs/logo.png" alt="logo" width="40px" height="40px"></div>
      <ul class="navbar">
        <li><a href="index.html">HOME</a></li>
        <li class="agora"><a href="quiz.html">QUIZ</a></li>
        <li><a href="login.html">LOGIN</a></li>
        <li><button class="btn-cadastro"><a href="cadastro.html">CADASTRO</a></button></li>
      </ul>
    </div>
  </div>

  <div class="quiz-container">
    <div class="container-perguntas">
      <div id="pontuacaoEJogo">
        <span id="titulo-quiz-quiz">Quiz</span>
        <h1 id="titulo-quiz">Quanto você sabe sobre o mundo Pop??</h1>

        <button id="btnIniciarQuiz" onclick="iniciarQuiz()">
          <img src="https://api.iconify.design/arcticons:discogs.svg" width="24" height="24" />
          <span class="btn-comecar">Começar</span>
        </button>

        <div id="jogo" class="width-fit-content flex-colunar border-secondary">
          <div id="infoQuestao" class="padding-8">
            <span>Questão atual: <span id="spanNumeroDaQuestaoAtual"></span>/<span id="qtdQuestoes"></span></span>
          </div>

          <div id="perguntaDaQuestaoAtual" class="padding-8">
            <span id="spanQuestaoExibida" class="text-bold"></span>
          </div>

          <div id="opcoes" class="flex-colunar padding-8">
            <div id="infoAlternativas" class="padding-8">
              <span><em>Escolha uma opção dentre as abaixo:</em></span>
            </div>

            <div class="opcoes2">
              <div class="card-opcao">
                <span>
                  <input type="radio" id="opcao1" name="option" class="radio" value="0" />
                  <label for="opcao1" class="option" id="labelOpcao1"></label>
                </span>
              </div>
              <div class="card-opcao">
                <span>
                  <input type="radio" id="opcao2" name="option" class="radio" value="1" />
                  <label for="opcao2" class="option" id="labelOpcao2"></label>
                </span>
              </div>
              <div class="card-opcao">
                <span>
                  <input type="radio" id="opcao3" name="option" class="radio" value="2" />
                  <label for="opcao3" class="option" id="labelOpcao3"></label>
                </span>
              </div>
              <div class="card-opcao">
                <span>
                  <input type="radio" id="opcao4" name="option" class="radio" value="3" />
                  <label for="opcao4" class="option" id="labelOpcao4"></label>
                </span>
              </div>
            </div>
          </div>
          <div id="botoes" class="flex-colunar padding-8">
          <button onclick="submeter()" id="btnSubmeter">Submeter resposta</button>
          <button onclick="avancar()" id="btnProx">Avançar para próxima questão</button>
        </div>

          <div id="pontuacao" class="card-pontuacao">
            <div class="resultado">
              <span>Parabéns por concluir!</span>
              <span id="titulo-resultado">Seu resultado foi registrado!</span>
            </div>
            <div class="btns">
            <button onclick="tentarNovamente()" id="btnTentarNovamente" disabled>Tentar novamente</button>
            <button onclick="verResultado()" id="btnVerResultado" disabled>Ver resultado</button>
          </div>
        </div>

          
        </div>

      </div>
    </div>
  </div>
</body>

<script>
  /*
    Cada alternativa tem: texto (exibido), artista (ou null), genero (ou null).
    Quando o usuário escolhe "Outro" em artista → artista: "Outro"
    Quando o usuário escolhe "Outro" em gênero  → genero: "Outro"
    Ambos aparecem normalmente nos gráficos da dashboard.
    Alternativas de perguntas de comportamento não têm artista nem gênero → null → não contam nos gráficos.
  */
  const listaDeQuestoes = [
    {
      pergunta: "Quando você ouve música, você...",
      alternativas: [
        { texto: "Dança e canta como se estivesse no palco", artista: null, genero: null },
        { texto: "Fecha os olhos e sente cada nota", artista: null, genero: null },
        { texto: "Começa a analisar cada parte da música", artista: null, genero: null },
        { texto: "Pega um instrumento e toca junto", artista: null, genero: null }
      ]
    },
    {
      pergunta: "Seu artista favorito é..",
      alternativas: [
        { texto: "Lana Del Rey", artista: "Lana Del Rey", genero: null },
        { texto: "Sabrina Carpenter", artista: "Sabrina Carpenter", genero: null },
        { texto: "PinkPantheress", artista: "PinkPantheress", genero: null },
        { texto: "Chappell Roan", artista: "Chappell Roan", genero: null },
        { texto: "Olivia Rodrigo", artista: "Olivia Rodrigo", genero: null },
        { texto: "Outro", artista: "Outro", genero: null }
      ]
    },
    {
      pergunta: "Qual gênero você mais ouve?",
      alternativas: [
        { texto: "Pop", artista: null, genero: "Pop" },
        { texto: "Rock", artista: null, genero: "Rock" },
        { texto: "Indie", artista: null, genero: "Indie" },
        { texto: "Outro", artista: null, genero: "Outro" }
      ]
    }
  ];

  let numeroDaQuestaoAtual = 0;
  let indiceSelecionado = null;

  function onloadEsconder() {
    document.getElementById('jogo').style.display = "none";
    document.getElementById('pontuacao').style.display = "none";
  }

  function validarSessaoQuiz() {
    if (!sessionStorage.ID_USUARIO) {
      alert("Faça o login para acessar o quiz!");
      window.location = "login.html";
    }
  }

  function iniciarQuiz() {
    document.getElementById('pontuacao').style.display = "none";
    document.getElementById('jogo').style.display = "flex";
    document.getElementById('btnIniciarQuiz').style.display = "none";
    document.getElementById('titulo-quiz').style.display = "none";
    document.getElementById('titulo-quiz-quiz').style.display = "none";
    document.getElementById('qtdQuestoes').innerHTML = listaDeQuestoes.length;

    numeroDaQuestaoAtual = 0;
    exibirQuestao(0);

    document.getElementById('btnSubmeter').disabled = false;
    document.getElementById('btnProx').disabled = true;
  }

  function exibirQuestao(index) {
    indiceSelecionado = null;
    desmarcarRadioButtons();

    const questao = listaDeQuestoes[index];
    document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = index + 1;
    document.getElementById("spanQuestaoExibida").innerHTML = questao.pergunta;
    document.getElementById("labelOpcao1").innerHTML = questao.alternativas[0].texto;
    document.getElementById("labelOpcao2").innerHTML = questao.alternativas[1].texto;
    document.getElementById("labelOpcao3").innerHTML = questao.alternativas[2].texto;
    document.getElementById("labelOpcao4").innerHTML = questao.alternativas[3].texto;

    habilitarAlternativas(true);
  }

  function habilitarAlternativas(habilitar) {
    ["opcao1", "opcao2", "opcao3", "opcao4"].forEach(id => {
      document.getElementById(id).disabled = !habilitar;
    });
  }

  function desmarcarRadioButtons() {
    document.getElementsByName("option").forEach(r => r.checked = false);
  }

  function submeter() {
    const opcoes = document.getElementsByName("option");
    let escolhida = null;
    opcoes.forEach(opcao => {
      if (opcao.checked) escolhida = parseInt(opcao.value);
    });

    if (escolhida === null) {
      alert("Escolha uma opção antes de submeter.");
      return;
    }

    indiceSelecionado = escolhida;
    document.getElementById('btnSubmeter').disabled = true;
    document.getElementById('btnProx').disabled = false;
    habilitarAlternativas(false);

    const alternativa = listaDeQuestoes[numeroDaQuestaoAtual].alternativas[indiceSelecionado];

    fetch("/quiz/salvarResposta", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        idUsuario: sessionStorage.ID_USUARIO,
        artista: alternativa.artista,
        genero: alternativa.genero
      })
    })
      .then(res => { if (!res.ok) console.error("Erro ao salvar resposta"); })
      .catch(err => console.error("Erro na requisição:", err));
  }

  function avancar() {
    numeroDaQuestaoAtual++;

    if (numeroDaQuestaoAtual < listaDeQuestoes.length) {
      if (numeroDaQuestaoAtual === listaDeQuestoes.length - 1) {
        alert("Atenção... a próxima é a última questão!");
      }
      exibirQuestao(numeroDaQuestaoAtual);
      document.getElementById('btnSubmeter').disabled = false;
      document.getElementById('btnProx').disabled = true;
    } else {
      finalizarJogo();
    }
  }

  function finalizarJogo() {
    document.getElementById('pontuacao').style.display = "flex";
    document.getElementById('opcoes').style.display = "none";
    document.getElementById('infoQuestao').style.display = "none";
    document.getElementById('perguntaDaQuestaoAtual').style.display = "none";
    document.getElementById('infoAlternativas').style.display = "none";
    document.getElementById('botoes').style.display = "none";
    document.getElementById('btnTentarNovamente').disabled = false;
    document.getElementById('btnVerResultado').disabled = false;
  }

  function tentarNovamente() {
    window.location.reload();
  }
  function verResultado() {
    window.location = "./dashboard/dashboard.html";

  }
</script>

</html>
